name: Flutter CI

on:
  push:
    branches:
      - main
    paths:
      - "apps/mobile/**"
      - ".github/workflows/flutter-ci.yml"

  pull_request:
    branches:
      - main
    paths:
      - "apps/mobile/**"
      - ".github/workflows/flutter-ci.yml"

workflow_dispatch:

jobs:
  flutter-ci:
    name: Analyze, Test, Build Debug APK
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: apps/mobile

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Show Flutter version
        run: flutter --version

      - name: Install Flutter dependencies
        run: flutter pub get

      - name: Verify formatting
        run: dart format --set-exit-if-changed lib test
        continue-on-error: true

      - name: Analyze project
        run: flutter analyze

      - name: Run tests
        run: flutter test
        continue-on-error: true

      - name: Build debug APK
        run: flutter build apk --debug

      - name: Rename debug APK
        run: |
          mkdir -p release
          cp build/app/outputs/flutter-apk/app-debug.apk release/laras-debug.apk

      - name: Upload debug APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: laras-debug-apk
          path: apps/mobile/release/laras-debug.apk
          retention-days: 14
